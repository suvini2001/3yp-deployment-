# ──────────────────────────────────────────────────────────────
# Integration Test Properties
# These override application.properties when the 'integration'
# profile is active.  No real AWS services are used.
# ──────────────────────────────────────────────────────────────

server.port=0

# Allow @Primary beans in IntegrationTestBeanConfig to override
# the real beans from DynamoDbConfig and MqttConfig.
spring.main.allow-bean-definition-overriding=true

# Fake AWS credentials (DynamoDbClient is mocked at context level)
aws.accessKeyId=fakeKey
aws.secretKey=fakeSecret
aws.region=us-east-1
aws.dynamodb.tableName=ir_cracks_detection_test

# Disable MQTT auto-startup so no real broker connection is attempted
aws.iot.auto-startup=false
aws.iot.broker.url=tcp://localhost:1883
aws.iot.broker.clientId=test-client-integration
aws.iot.topic.filter=test/cracks

